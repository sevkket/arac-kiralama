<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şikayet Sayfası</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(#08c4ff, #0875b6, #0ffff8);
            margin: 0;
            padding: 0;
        }

        .vertical-line {
            position: fixed; 
            top: 0;
            left: 0;          
            width: 100px;       
            height: 100%;     
            background: linear-gradient(#056ee7, #03c3fa, #0ffff7);
        }

        header {
            background: linear-gradient(#32569a, #6091fb, #96d0ff);
            color: white;
            text-align: center;
            padding: 20px 0;
            width: 100%;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
        }

        .form-container {
            width: 80%;
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            background: linear-gradient(#b9ffeb, #ccfff7, #0ffff7);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-container h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        label {
            font-size: 16px;
            margin-bottom: 8px;
            display: inline-block;
        }

        input[type="text"], input[type="email"], textarea {
            width: 99%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .submit-btn {
            background-color: #00d6d3;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #4571d9;
        }

        .cancel-btn {
            background-color: #00d6d3; 
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 10px;
            width: 100%;
        }

        .cancel-btn:hover {
            background-color: #354b8a;
        }

        .suggestion-btn {
            background-color: #20dad8;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            margin-top: 10px;
        }

        .suggestion-btn:hover {
            background-color: #146089;
        }

        footer {
            background: linear-gradient(#008bb5, #00fbd5, #00469e);
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="vertical-line"></div>

    <header>
        <h1>Şikayet ve Geri Bildirim</h1>
    </header>

    <div class="form-container">
        <h2>Şikayet&Öneri Yazınız</h2>

        <form action="işlem-sayfası.html" method="POST">
            <label for="name">Adınız</label>
            <input type="text" id="name" name="name" placeholder="Adınızı girin">
            
            <label for="email">E-posta Adresiniz</label>
            <input type="email" id="email" name="email" placeholder="E-posta adresinizi girin">

            <label for="complaint">Şikayetiniz</label><br>
            <textarea id="complaint" name="complaint" placeholder="Şikayetinizi buraya yazın..."></textarea><br>

            <button type="submit" class="submit-btn">Şikayet Gönder</button>

            <button type="reset" class="cancel-btn">İptal Et</button>

            <!-- Öneri Gönder Butonu -->
            <button type="submit" class="suggestion-btn">Öneri Gönder</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2024 Şirket Adı - Tüm hakları saklıdır</p>
    </footer>

</body>
</html>
